<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${post.title}">상세</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous"/>
</head>
<body class="bg-light">
<div th:replace="~{fragments/navbar :: navbar}"></div>
<main class="container pb-5" style="max-width: 48rem;">
    <div th:if="${message}" class="alert alert-success" role="alert" th:text="${message}"></div>
    <article class="card shadow-sm">
        <div class="card-body p-4">
            <h1 class="h3 card-title mb-3" th:text="${post.title}">제목</h1>
            <p class="text-muted small mb-4">
                <span th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}">2026-01-01 12:00</span>
                <span class="ms-2">#<span th:text="${post.id}">1</span></span>
            </p>
            <div class="border-top pt-3" style="white-space: pre-wrap;" th:text="${post.content}">내용</div>
        </div>
    </article>
    <div class="mt-3 d-flex flex-wrap gap-2">
        <a class="btn btn-outline-primary" th:href="@{/posts}">목록</a>
        <a class="btn btn-primary" th:href="@{/posts/{id}/edit(id=${post.id})}">수정</a>
        <form th:action="@{/posts/{id}/delete(id=${post.id})}" method="post" class="d-inline"
              onsubmit="return confirm('이 게시글을 삭제할까요?');">
            <button type="submit" class="btn btn-outline-danger">삭제</button>
        </form>
    </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>
</html>
