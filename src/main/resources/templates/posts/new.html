<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/ide-layout :: page('게시글 작성', ~{::section})}">
<section style="max-width: 52rem;">
    <div class="d-flex align-items-center justify-content-between mb-3">
        <div>
            <h1 class="h4 mb-1">게시글 작성</h1>
            <div class="text-muted small">새 글을 작성합니다.</div>
        </div>
        <a class="btn btn-outline-primary" th:href="@{/posts}">
            <i class="bi bi-arrow-left me-1"></i>
            목록
        </a>
    </div>

    <form th:action="@{/posts}" th:object="${post}" method="post" class="card shadow-sm p-4">
        <div class="mb-3">
            <label for="title" class="form-label">제목</label>
            <input id="title" type="text" th:field="*{title}" class="form-control" data-maxlength="200"
                   th:classappend="${#fields.hasErrors('title')} ? ' is-invalid'" maxlength="200"/>
            <div class="invalid-feedback" th:if="${#fields.hasErrors('title')}" th:errors="*{title}">오류</div>
        </div>
        <div class="mb-4">
            <label for="content" class="form-label">내용</label>
            <textarea id="content" th:field="*{content}" class="form-control" rows="10" data-maxlength="10000"
                      th:classappend="${#fields.hasErrors('content')} ? ' is-invalid'"></textarea>
            <div class="invalid-feedback" th:if="${#fields.hasErrors('content')}" th:errors="*{content}">오류</div>
        </div>
        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">등록</button>
            <a class="btn btn-outline-secondary" th:href="@{/posts}">취소</a>
        </div>
    </form>
</section>
</html>
