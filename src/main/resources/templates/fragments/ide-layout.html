<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${title}">Board IDE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <link rel="stylesheet" th:href="@{/css/ide.css}"/>
</head>
<body th:fragment="page(title, content)">
<div class="ide-root" data-theme="dark">
    <header class="ide-topbar">
        <div class="ide-topbar-left">
            <span class="ide-dot ide-dot-red"></span>
            <span class="ide-dot ide-dot-yellow"></span>
            <span class="ide-dot ide-dot-green"></span>
            <span class="ide-app-title">
                <i class="bi bi-braces-asterisk"></i>
                Board IDE
            </span>
        </div>
        <div class="ide-topbar-center">
            <span class="ide-breadcrumb" th:text="${title}">현재 화면</span>
        </div>
        <div class="ide-topbar-right">
            <button type="button" class="btn btn-sm ide-btn" data-action="toggle-theme" aria-label="Toggle theme">
                <i class="bi bi-moon-stars"></i>
                Theme
            </button>
        </div>
    </header>

    <div class="ide-body">
        <aside class="ide-sidebar">
            <div class="ide-sidebar-section">
                <div class="ide-sidebar-title">EXPLORER</div>
                <a class="ide-nav-item"
                   th:classappend="${#httpServletRequest.requestURI.startsWith('/posts')} ? ' active' : ''"
                   th:href="@{/posts}">
                    <i class="bi bi-list-task"></i>
                    posts
                </a>
                <a class="ide-nav-item"
                   th:classappend="${#httpServletRequest.requestURI == '/posts/new'} ? ' active' : ''"
                   th:href="@{/posts/new}">
                    <i class="bi bi-file-earmark-plus"></i>
                    new
                </a>
                <a class="ide-nav-item" th:href="@{/h2-console}" target="_blank" rel="noopener">
                    <i class="bi bi-database"></i>
                    h2-console
                    <i class="bi bi-box-arrow-up-right ms-auto opacity-75"></i>
                </a>
            </div>

            <div class="ide-sidebar-section mt-auto">
                <div class="ide-sidebar-title">STATUS</div>
                <div class="ide-status">
                    <span class="ide-badge">Spring Boot</span>
                    <span class="ide-badge">Thymeleaf</span>
                    <span class="ide-badge">H2</span>
                </div>
            </div>
        </aside>

        <main class="ide-main">
            <div class="ide-tabbar">
                <div class="ide-tab active">
                    <i class="bi bi-filetype-html me-2"></i>
                    <span th:text="${title}">Tab</span>
                </div>
            </div>

            <div class="ide-content">
                <div class="ide-container">
                    <div th:if="${message}" class="alert alert-success ide-alert" role="alert" th:text="${message}"></div>
                    <div th:insert="${content}"></div>
                </div>
            </div>
        </main>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
<script th:src="@{/js/ide.js}"></script>
</body>
</html>
