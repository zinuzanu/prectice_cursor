<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/ide-layout :: page(${post.title}, ~{::section})}">
<section style="max-width: 52rem;">
    <article class="card shadow-sm">
        <div class="card-body p-4">
            <div class="d-flex flex-wrap align-items-start justify-content-between gap-2 mb-3">
                <div>
                    <h1 class="h4 card-title mb-1" th:text="${post.title}">제목</h1>
                    <div class="text-muted small">
                        <span th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}">2026-01-01 12:00</span>
                        <span class="ms-2">#<span th:text="${post.id}">1</span></span>
                    </div>
                </div>
                <div class="d-flex gap-2">
                    <a class="btn btn-outline-primary" th:href="@{/posts}">
                        <i class="bi bi-arrow-left me-1"></i>
                        목록
                    </a>
                    <a class="btn btn-primary" th:href="@{/posts/{id}/edit(id=${post.id})}">
                        <i class="bi bi-pencil-square me-1"></i>
                        수정
                    </a>
                </div>
            </div>

            <div class="border-top pt-3" style="white-space: pre-wrap;" th:text="${post.content}">내용</div>
        </div>
    </article>

    <div class="mt-3 d-flex flex-wrap gap-2">
        <form th:action="@{/posts/{id}/delete(id=${post.id})}" method="post" class="d-inline"
              onsubmit="return confirm('이 게시글을 삭제할까요?');">
            <button type="submit" class="btn btn-outline-danger">
                <i class="bi bi-trash3 me-1"></i>
                삭제
            </button>
        </form>
    </div>
</section>
</html>
