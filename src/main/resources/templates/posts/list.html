<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>게시글 목록</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous"/>
</head>
<body class="bg-light">
<div th:replace="~{fragments/navbar :: navbar}"></div>
<main class="container pb-5">
    <div th:if="${message}" class="alert alert-success" role="alert" th:text="${message}"></div>
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h3 mb-0">게시글 목록</h1>
        <a class="btn btn-primary" th:href="@{/posts/new}">새 글</a>
    </div>

    <form class="row g-2 mb-3" th:action="@{/posts}" method="get">
        <div class="col-12 col-md">
            <input type="text" class="form-control" name="q" placeholder="제목/내용 검색"
                   th:value="${q}"/>
        </div>
        <div class="col-12 col-md-auto">
            <button type="submit" class="btn btn-outline-primary w-100">검색</button>
        </div>
        <div class="col-12 col-md-auto">
            <a class="btn btn-outline-secondary w-100" th:href="@{/posts}">초기화</a>
        </div>
    </form>

    <div class="card shadow-sm">
        <div class="table-responsive mb-0">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                <tr>
                    <th style="width: 5rem;">번호</th>
                    <th>제목</th>
                    <th style="width: 12rem;">작성일</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="post : ${page.content}">
                    <td th:text="${post.id}">1</td>
                    <td>
                        <a th:href="@{/posts/{id}(id=${post.id})}" th:text="${post.title}">제목</a>
                    </td>
                    <td th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}">2026-01-01 12:00</td>
                </tr>
                <tr th:if="${page.totalElements == 0}">
                    <td colspan="3" class="text-center text-muted py-4">등록된 게시글이 없습니다.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <nav class="mt-3" th:if="${page.totalPages > 1}" aria-label="페이지 이동">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${page.first} ? ' disabled'">
                <a class="page-link"
                   th:href="@{/posts(page=${page.number - 1}, size=${page.size}, q=${q})}"
                   aria-label="Previous">&laquo;</a>
            </li>
            <li class="page-item"
                th:each="i : ${#numbers.sequence(0, page.totalPages - 1)}"
                th:classappend="${i == page.number} ? ' active'">
                <a class="page-link" th:href="@{/posts(page=${i}, size=${page.size}, q=${q})}"
                   th:text="${i + 1}">1</a>
            </li>
            <li class="page-item" th:classappend="${page.last} ? ' disabled'">
                <a class="page-link"
                   th:href="@{/posts(page=${page.number + 1}, size=${page.size}, q=${q})}"
                   aria-label="Next">&raquo;</a>
            </li>
        </ul>
    </nav>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>
</html>
